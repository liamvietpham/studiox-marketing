name: Deploy static site to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-s3-site
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  BUILD_DIR: build/client
  S3_PREFIX: site

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Validate deploy settings
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
        run: |
          [ -n "$AWS_REGION" ] || (echo "Missing repository variable AWS_REGION" && exit 1)
          [ -n "$AWS_S3_BUCKET" ] || (echo "Missing repository variable AWS_S3_BUCKET" && exit 1)

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build static site
        run: yarn build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload versioned static assets
        env:
          AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
        run: |
          aws s3 sync "$BUILD_DIR/" "s3://$AWS_S3_BUCKET/$S3_PREFIX/" \
            --delete \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Remove stale HTML files
        env:
          AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
        run: |
          aws s3 sync "$BUILD_DIR/" "s3://$AWS_S3_BUCKET/$S3_PREFIX/" \
            --delete \
            --exclude "*" \
            --include "*.html"

      - name: Upload HTML files
        env:
          AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
        run: |
          aws s3 cp "$BUILD_DIR/" "s3://$AWS_S3_BUCKET/$S3_PREFIX/" \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8"
